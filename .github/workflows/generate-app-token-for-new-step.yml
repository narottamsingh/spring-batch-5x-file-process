name: Generate App Token For other steps

on:
  workflow_dispatch:

jobs:
  generate-token:
    runs-on: ubuntu-latest
    outputs:
      token: ${{ steps.app-token.outputs.token }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Display Token Info
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "✅ GitHub App Token generated successfully"
          echo "Token can be used for API calls and GitHub operations"

  report-generate:
    needs: generate-token
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Report with Token
        env:
          GH_TOKEN: ${{ needs.generate-token.outputs.token }}
        run: |
          echo "🔧 Report Generation Job"
          echo "Using GH_TOKEN from generate-token job"
          echo "Token is available: ${#GH_TOKEN}"
          
          # Example: Use token for API calls
          # gh api user
          
          echo "✅ Report generated successfully"

      - name: Display Report Info
        env:
          GH_TOKEN: ${{ needs.generate-token.outputs.token }}
        run: |
          echo "📊 Report Details"
          echo "Using authenticated GitHub operations"
